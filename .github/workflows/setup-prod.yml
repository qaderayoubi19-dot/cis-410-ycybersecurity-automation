name: Setup Production Server

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: self-hosted

    steps:
      - name: Create SSH key
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > prod_key
          chmod 600 prod_key

      - name: Configure sudo and install Docker
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USERNAME: ${{ secrets.PROD_USER }}
          PASS: ${{ secrets.SUDO_PASS }}
        run: |
          ssh -i prod_key -o StrictHostKeyChecking=no $USERNAME@$HOST << EOF
          set -e

          echo "$PASS" | sudo -S bash -c "echo '$USERNAME ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/$USERNAME && chmod 0440 /etc/sudoers.d/$USERNAME"

          sudo apt update -y
          sudo apt install -y curl

          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $USERNAME
            rm get-docker.sh
          fi

          sudo mkdir -p /opt/app
          sudo chown $USERNAME:$USERNAME /opt/app

          docker --version
          docker compose version || true
          echo "DONE"
          EOF

      - name: Cleanup
        run: rm -f prod_key